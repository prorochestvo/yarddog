# deploy/nginx-dashboard.sample.conf
#
# Reference for the ONE-TIME, out-of-band nginx change that switches the pi5
# dashboard from the hand-maintained /var/www static page to the daemon's
# embedded UI (plans/011), and adds the /api/v1/overview proxy the weekly
# dashboard section consumes (plans/010 + plans/012).
#
# These are the location blocks to MERGE INTO the existing vhost
# /etc/nginx/sites-available/dev.seilbekskindirov.pi5 — this is not a
# standalone server{}. The daemon listens on 127.0.0.1:5000 (DAEMON_ADDR).
# Applying it requires root (edit + `sudo nginx -t` + `sudo systemctl reload
# nginx`) and is an operator step: propose the commands and wait — never edit
# or reload nginx from CI or a Claude session (github_aide cannot touch nginx).
#
# Once it is live, the static /var/www/dev.seilbekskindirov.pi5/index.html is
# dead (plans/011 Task 5) and can be removed; keep nginx's own 403/404 pages.

# Serve the dashboard from the daemon instead of `try_files /index.html`. The
# daemon owns the page now, so the UI version always equals the API version. A
# hard-down daemon would otherwise turn `/` into a bare 502, so intercept it
# with a tiny holding page (the daemon has Restart=on-failure and deploys are
# /ping-health-gated, so this state is transient).
location = / {
    proxy_pass http://127.0.0.1:5000/;
    proxy_set_header Host $host;
    proxy_http_version 1.1;

    proxy_connect_timeout 2s;
    proxy_read_timeout    5s;

    proxy_intercept_errors on;
    error_page 502 503 504 = @dashboard_down;
}

location @dashboard_down {
    default_type text/html;
    add_header Cache-Control "no-store" always;
    return 503 '<!doctype html><meta charset=utf-8><title>pi5 · status</title><body style="background:#0b0b0c;color:#e5e5e5;font:14px monospace;padding:2rem"><p>&#36; yarddog status</p><p>dashboard is starting &mdash; the daemon is not answering yet.</p>';
}

# yarddog's weekly overview aggregation (plans/010), for the dashboard's
# retrospective section. Same root-only token injection and down-fallback as
# the existing /api/v1/metrics and /api/v1/pings blocks; the query string is
# forwarded so the page can pass ?bucket= / ?since= through to the daemon.
location = /api/v1/overview {
    include /etc/nginx/snippets/yarddog-auth.conf;

    proxy_pass http://127.0.0.1:5000/api/v1/overview$is_args$args;
    proxy_set_header Host $host;
    proxy_http_version 1.1;

    proxy_connect_timeout 2s;
    proxy_read_timeout    8s;   # a 7-day GROUP BY is heavier than the list endpoints

    add_header Cache-Control "no-store" always;

    proxy_intercept_errors on;
    error_page 401 403 404 500 502 503 504 = @metrics_down;
}
